<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Main | Github Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/images/github-logo.png"
      type="image/x-icon"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body class="bg-gray-100">
    <header id="header">
      <nav class="mt-5 md:mt-0">
        <div
          class="navbar bg-base-100 shadow-sm flex-col md:flex-row space-y-5 md:space-y-0 px-4 md:px-10"
        >
          <div class="flex-1">
            <div class="flex items-center gap-2">
              <img
                src="./assets/images/github-logo.png"
                alt=""
                class="w-7 h-7"
              />
              <p class="font-bold text-2xl">GitHub Issues Tracker</p>
            </div>
          </div>
          <div class="gap-2 flex">
            <label class="input w-[65%]">
              <svg
                class="h-[1em] opacity-50"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >
                <g
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  stroke-width="2.5"
                  fill="none"
                  stroke="currentColor"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.3-4.3"></path>
                </g>
              </svg>
              <input type="search" required placeholder="Search" class="grow"/>
            </label>
            <div class="dropdown dropdown-end w-[35%]">
              <button type="button" class="btn capitalize btn-primary"><i class="fa-solid fa-plus"></i> new issue</button>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main id="main" class="w-11/12 mx-auto my-5 md:w-10/12">
      <section id="tab-section" class="bg-white p-5">
        <div id="tab-container" class="flex gap-3">
          <button
            onclick="tabSelect('all')"
            id="all-tab"
            class="capitalize btn btn-primary"
          >
            all
          </button>
          <button
            onclick="tabSelect('open')"
            id="open-tab"
            class="capitalize btn"
          >
            open
          </button>
          <button
            onclick="tabSelect('closed')"
            id="closed-tab"
            class="capitalize btn"
          >
            closed
          </button>
        </div>
      </section>

      <section id="card-section" class="bg-white my-5 p-5">
        <div id="card-title" class="flex justify-between items-center">
          <div class="flex items-center gap-2">
            <img src="./assets/icons/Aperture.png" alt="" class="w-7 h-7" />
            <div>
              <h3 class="font-bold text-lg">
                <span id="card-all-num">50</span
                ><span id="card-open-num" class="hidden">40</span
                ><span id="card-closed-num" class="hidden">30</span> Issues
              </h3>
              <p class="text-sm">Track and manage your project issues</p>
            </div>
          </div>

          <div class="gap-5 md:flex">
            <p class="flex capitalize text-sm items-center">
              <i class="fa-solid fa-circle text-[10px] mr-1 text-[#00A96E]"></i
              >open
            </p>
            <p class="capitalize text-sm flex items-center">
              <i class="fa-solid fa-circle text-[10px] mr-1 text-[#A855F7]"></i
              >closed
            </p>
          </div>
        </div>
        
<dialog id="issues-modal-1" class="modal">
</dialog>

        <div id="open-container" class="hidden">
          <div
            id="open-card-list"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mt-5"
          ></div>
        </div>

        <div id="closed-container" class="hidden">
          <div
            id="closed-card-list"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mt-5"
          ></div>
        </div>

        <div id="all-container">
          <div
            id="card-list"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mt-5"
          ></div>
        </div>
      </section>
    </main>

    <footer id="footer">
    </footer>

    <script src="./scripts/main.js"></script>
    <script src="./scripts/login.js"></script>
  </body>
</html>
